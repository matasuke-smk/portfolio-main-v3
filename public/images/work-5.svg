<svg width="400" height="240" viewBox="0 0 400 240" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="400" height="240" fill="url(#gradient5)"/>
  <defs>
    <linearGradient id="gradient5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2c1810;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#8b4513;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#d2691e;stop-opacity:0.6" />
    </linearGradient>
  </defs>
  
  <!-- 高級和食レストランサイト -->
  <!-- ヘッダー -->
  <rect x="0" y="0" width="400" height="60" fill="black" fill-opacity="0.3"/>
  <rect x="50" y="25" width="60" height="10" rx="2" fill="white" fill-opacity="0.9"/>
  
  <!-- ナビゲーション -->
  <rect x="250" y="27" width="30" height="2" rx="1" fill="white" fill-opacity="0.7"/>
  <rect x="290" y="27" width="30" height="2" rx="1" fill="white" fill-opacity="0.7"/>
  <rect x="330" y="27" width="30" height="2" rx="1" fill="white" fill-opacity="0.7"/>
  
  <!-- メインビジュアル -->
  <rect x="30" y="80" width="120" height="80" rx="4" fill="white" fill-opacity="0.1"/>
  
  <!-- 料理画像プレースホルダー -->
  <circle cx="90" cy="120" r="25" fill="white" fill-opacity="0.15"/>
  <rect x="80" y="115" width="20" height="3" rx="1.5" fill="#d2691e" fill-opacity="0.8"/>
  <rect x="75" y="120" width="10" height="2" rx="1" fill="#d2691e" fill-opacity="0.6"/>
  <rect x="95" y="125" width="8" height="2" rx="1" fill="#d2691e" fill-opacity="0.6"/>
  
  <!-- メニューセクション -->
  <rect x="200" y="80" width="150" height="100" rx="4" fill="white" fill-opacity="0.08"/>
  
  <!-- メニュー項目 */
  <rect x="220" y="100" width="80" height="3" rx="1.5" fill="white" fill-opacity="0.8"/>
  <rect x="220" y="108" width="60" height="2" rx="1" fill="white" fill-opacity="0.6"/>
  <rect x="220" y="115" width="30" height="2" rx="1" fill="#d2691e" fill-opacity="0.8"/>
  
  <rect x="220" y="130" width="80" height="3" rx="1.5" fill="white" fill-opacity="0.8"/>
  <rect x="220" y="138" width="60" height="2" rx="1" fill="white" fill-opacity="0.6"/>
  <rect x="220" y="145" width="30" height="2" rx="1" fill="#d2691e" fill-opacity="0.8"/>
  
  <rect x="220" y="160" width="80" height="3" rx="1.5" fill="white" fill-opacity="0.8"/>
  <rect x="220" y="168" width="60" height="2" rx="1" fill="white" fill-opacity="0.6"/>
  <rect x="220" y="175" width="30" height="2" rx="1" fill="#d2691e" fill-opacity="0.8"/>
  
  <!-- 装飾要素（和風） -->
  <rect x="60" y="200" width="40" height="1" rx="0.5" fill="#d2691e" fill-opacity="0.6"/>
  <circle cx="50" cy="200" r="2" fill="#d2691e" fill-opacity="0.4"/>
  <circle cx="110" cy="200" r="2" fill="#d2691e" fill-opacity="0.4"/>
  
  <!-- 背景の和風パターン */
  <circle cx="350" cy="200" r="8" fill="white" fill-opacity="0.05"/>
  <circle cx="370" cy="210" r="6" fill="white" fill-opacity="0.03"/>
</svg>