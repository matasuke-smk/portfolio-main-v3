<svg width="400" height="240" viewBox="0 0 400 240" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="400" height="240" fill="url(#gradient6)"/>
  <defs>
    <linearGradient id="gradient6" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffeef7;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#fdd6e8;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#f8b5d1;stop-opacity:0.8" />
    </linearGradient>
  </defs>
  
  <!-- 美容皮膚科クリニックサイト -->
  <!-- ヘッダー -->
  <rect x="0" y="0" width="400" height="50" fill="white"/>
  <rect x="30" y="20" width="80" height="8" rx="2" fill="#f8b5d1" fill-opacity="0.8"/>
  
  <!-- ナビゲーション -->
  <rect x="250" y="22" width="25" height="2" rx="1" fill="#333" fill-opacity="0.7"/>
  <rect x="285" y="22" width="25" height="2" rx="1" fill="#333" fill-opacity="0.7"/>
  <rect x="320" y="22" width="25" height="2" rx="1" fill="#333" fill-opacity="0.7"/>
  <rect x="355" y="18" width="30" height="10" rx="5" fill="#00BFFF" fill-opacity="0.8"/>
  
  <!-- メインコンテンツ -->
  <rect x="50" y="70" width="300" height="100" rx="8" fill="white" fill-opacity="0.7"/>
  
  <!-- タイトル */
  <rect x="70" y="90" width="120" height="8" rx="4" fill="#f8b5d1" fill-opacity="0.9"/>
  <rect x="70" y="105" width="80" height="4" rx="2" fill="#333" fill-opacity="0.7"/>
  <rect x="70" y="115" width="100" height="4" rx="2" fill="#333" fill-opacity="0.5"/>
  
  <!-- 治療メニュー -->
  <rect x="70" y="135" width="60" height="20" rx="4" fill="white" stroke="#f8b5d1" stroke-width="1"/>
  <rect x="140" y="135" width="60" height="20" rx="4" fill="white" stroke="#f8b5d1" stroke-width="1"/>
  <rect x="210" y="135" width="60" height="20" rx="4" fill="white" stroke="#f8b5d1" stroke-width="1"/>
  
  <!-- Before/After セクション */
  <rect x="280" y="85" width="50" height="40" rx="4" fill="white" fill-opacity="0.8"/>
  <rect x="285" y="95" width="18" height="15" rx="2" fill="#f8f9fa"/>
  <rect x="307" y="95" width="18" height="15" rx="2" fill="#f8f9fa"/>
  <rect x="295" y="114" width="10" height="2" rx="1" fill="#f8b5d1" fill-opacity="0.8"/>
  
  <!-- 予約ボタン -->
  <rect x="150" y="190" width="100" height="30" rx="15" fill="#00BFFF" fill-opacity="0.9"/>
  <rect x="175" y="200" width="50" height="3" rx="1.5" fill="white" fill-opacity="0.9"/>
  
  <!-- 装飾要素 */
  <circle cx="320" cy="200" r="15" fill="#f8b5d1" fill-opacity="0.3"/>
  <circle cx="340" cy="185" r="10" fill="#f8b5d1" fill-opacity="0.2"/>
  <circle cx="360" cy="205" r="8" fill="#f8b5d1" fill-opacity="0.15"/>
  
  <!-- 清潔感のある装飾線 */
  <rect x="50" y="180" width="200" height="1" rx="0.5" fill="#f8b5d1" fill-opacity="0.4"/>
</svg>